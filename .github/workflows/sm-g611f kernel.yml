name: 🔥 SM-G611F Kernel Builder (Auto)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    # ============================================
    # 1. ORTAM HAZIRLIĞI
    # ============================================
    - name: ⚡ Setup Environment
      run: |
        sudo apt update
        sudo apt install -y git build-essential flex bison bc \
          zip curl python3-pip libssl-dev device-tree-compiler \
          gcc-aarch64-linux-gnu make gcc libncurses5-dev \
          libelf-dev libssl-dev dwarves

    # ============================================
    # 2. KERNEL KAYNAĞI
    # ============================================
    - name: 📥 Download Samsung Kernel
      run: |
        mkdir -p kernel-source
        if [ -f "Kernel.tar.gz" ]; then
          tar -xzf Kernel.tar.gz -C kernel-source/
        else
          pip3 install gdown
          gdown "https://drive.google.com/uc?id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" -O source.zip
          unzip source.zip -d kernel-source/
        fi
        
        cd kernel-source
        
        if [ -f "Kernel.tar.gz" ]; then
          tar -xzf Kernel.tar.gz
        fi
        
        if [ -f "Platform.tar.gz" ]; then
          tar -xzf Platform.tar.gz
        fi
        
        if [ -d "kernel" ]; then
          mv kernel/* .
          rmdir kernel
        fi
        
        echo "✅ Kaynaklar hazır!"
        echo "📂 Klasör yapısı:"
        ls -la | head -20

    # ============================================
    # 3. TOOLCHAIN
    # ============================================
    - name: 🔧 Setup Toolchain
      run: |
        cd kernel-source
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain
        export PATH=$(pwd)/toolchain/bin:$PATH
        echo "PATH=$(pwd)/toolchain/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "ARCH=arm64" >> $GITHUB_ENV

    # ============================================
    # 4. KERNEL DERLE (build.sh VAR MI?)
    # ============================================
    - name: 🏗️ Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        
        # 1. Config dosyasını bul
        echo "🔍 Config dosyası aranıyor..."
        CONFIG_FILE=$(find . -name "on7xreflte_01_defconfig" | head -1)
        if [ -z "$CONFIG_FILE" ]; then
          CONFIG_FILE=$(find . -name "*defconfig" | head -1)
        fi
        
        if [ -z "$CONFIG_FILE" ] || [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Hiçbir config dosyası bulunamadı!"
          exit 1
        fi
        
        echo "✅ Config: $CONFIG_FILE"
        cp "$CONFIG_FILE" .config
        
        # 2. Treble ayarlarını ekle
        echo "📂 Treble ayarları ekleniyor..."
        cat >> .config <<'EOF'
        CONFIG_ANDROID_BINDER_IPC=y
        CONFIG_ANDROID_BINDERFS=y
        CONFIG_ANDROID_VENDOR=y
        CONFIG_ANDROID_TREBLE=y
        CONFIG_ARM64_4K_PAGES=y
        CONFIG_ARM64_16K_PAGES=n
        CONFIG_ION=y
        CONFIG_SYNC_FILE=y
        CONFIG_DM_ANDROID=y
        CONFIG_OVERLAY_FS=y
        CONFIG_HZ_300=y
        CONFIG_PREEMPT=y
        CONFIG_ENERGY_AWARE_SCHEDULING=y
        CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
        EOF
        
        # 3. build.sh VAR MI KONTROL ET
        echo "🔍 build.sh kontrol ediliyor..."
        if [ -f "build.sh" ]; then
          echo "✅ build.sh bulundu! Çalıştırılıyor..."
          chmod +x build.sh
          ./build.sh
        else
          echo "⚠️ build.sh yok! Standart make ile deneniyor..."
          
          # Makefile hedeflerini göster
          echo "📂 Makefile hedefleri:"
          make -qp 2>/dev/null | grep -E '^[a-zA-Z0-9_-]+:' | cut -d: -f1 | head -20 || echo "Makefile okunamadı!"
          
          # Dene: zImage veya Image
          echo "📂 Derleme deneniyor..."
          make -j$(nproc) zImage dtbs 2>/dev/null || \
          make -j$(nproc) Image dtbs 2>/dev/null || \
          make -j$(nproc) zImage 2>/dev/null || \
          make -j$(nproc) Image 2>/dev/null || \
          make -j$(nproc) 2>/dev/null
        fi
        
        # 4. Derleme sonucunu kontrol et
        echo "📂 Derleme sonucu kontrol ediliyor..."
        
        # Image.gz ara
        if [ -f "arch/arm64/boot/Image.gz" ]; then
          echo "✅ Image.gz bulundu!"
          ls -lh arch/arm64/boot/Image.gz
          KERNEL_IMG="arch/arm64/boot/Image.gz"
          
        # Image ara
        elif [ -f "arch/arm64/boot/Image" ]; then
          echo "✅ Image bulundu! Sıkıştırılıyor..."
          gzip -9 arch/arm64/boot/Image
          KERNEL_IMG="arch/arm64/boot/Image.gz"
          
        # zImage ara
        elif [ -f "arch/arm64/boot/zImage" ]; then
          echo "✅ zImage bulundu! Sıkıştırılıyor..."
          gzip -9 arch/arm64/boot/zImage
          mv arch/arm64/boot/zImage.gz arch/arm64/boot/Image.gz
          KERNEL_IMG="arch/arm64/boot/Image.gz"
          
        # Diğer olası isimler
        else
          echo "❌ Bilinen bir kernel görüntüsü bulunamadı!"
          echo "📂 Mevcut dosyalar:"
          find . -name "*Image*" -o -name "*zImage*" | head -20
          exit 1
        fi
        
        echo "✅ KERNEL_IMG=$KERNEL_IMG"

    # ============================================
    # 5. BOOT.IMG OLUŞTUR
    # ============================================
    - name: 📦 Create Boot.img
      run: |
        mkdir -p boot-package
        
        KERNEL_IMG="kernel-source/arch/arm64/boot/Image.gz"
        if [ ! -f "$KERNEL_IMG" ]; then
          echo "❌ Kernel görüntüsü yok!"
          exit 1
        fi
        
        echo "✅ Kernel: $KERNEL_IMG"
        
        dd if=/dev/zero of=boot-package/boot.img bs=1M count=32
        dd if=$KERNEL_IMG of=boot-package/boot.img bs=4096 seek=2048 conv=notrunc
        
        if [ -d "kernel-source/arch/arm64/boot/dts" ]; then
          for dtb in kernel-source/arch/arm64/boot/dts/*/*.dtb 2>/dev/null; do
            [ -f "$dtb" ] && dd if=$dtb of=boot-package/boot.img bs=4096 seek=4096 conv=notrunc
          done
        fi
        
        echo "✅ boot.img oluşturuldu!"
        ls -lh boot-package/boot.img

    # ============================================
    # 6. ORANGEFOX PAKETİ
    # ============================================
    - name: 🦊 Create OrangeFox Package
      run: |
        mkdir -p ofox-package/META-INF/com/google/android
        mkdir -p ofox-package/devices/g611f
        
        cat > ofox-package/META-INF/com/google/android/updater-script <<'EOF'
        ui_print(" ");
        ui_print("🦊 OrangeFox Recovery");
        ui_print("📱 SM-G611F Universal Kernel");
        ui_print("=======================================");
        ui_print(" ");
        ui_print("🔹 Tüm PixelOS GSI'lar ile uyumlu");
        ui_print("🔹 Treble + ARM64");
        ui_print("🔹 Android 14/15 Compatible");
        ui_print(" ");
        
        if [ -e "/dev/block/by-name/boot" ]; then
          BOOT_PART="/dev/block/by-name/boot"
        else
          ui_print "❌ Boot partition not found!"
          exit 1
        fi
        
        ui_print "📌 Flashing kernel...";
        dd if=/dev/zero of=$BOOT_PART bs=4096 count=8192
        package_extract_file("boot.img", $BOOT_PART);
        
        ui_print " ";
        ui_print "✅ Kernel flashed!";
        ui_print "📌 Şimdi PixelOS GSI'yı flashla:";
        ui_print "   Install → Install Image → system.img";
        ui_print "   Partition: System Image";
        ui_print "   Sonra Format Data → Reboot";
        ui_print(" ");
        ui_print("🔄 Rebooting...");
        sleep 5
        reboot
        EOF
        
        cp boot-package/boot.img ofox-package/
        
        cat > ofox-package/devices/g611f/device.prop <<EOF
        ro.product.model=SM-G611F
        ro.product.brand=samsung
        ro.product.device=g611f
        ro.arch=arm64
        ro.treble.enabled=true
        ro.vndk.version=34
        ro.product.cpu.abi=arm64-v8a
        EOF
        
        cd ofox-package
        zip -r9 ../SM-G611F_Universal_Kernel_$(date +%Y%m%d_%H%M).zip *
        cd ..

    # ============================================
    # 7. SONUÇLARI YAYINLA
    # ============================================
    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SM-G611F-Universal-Kernel
        path: |
          SM-G611F_Universal_Kernel_*.zip
          boot-package/boot.img
        retention-days: 7
