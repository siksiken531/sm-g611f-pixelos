name: Samsung Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Gerekli Paketleri Kur
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential flex libssl-dev libncurses-dev

      - name: Kaynak Kodları İndir
        run: |
          # Git clone yerine, doğrudan indirme linkini kullanıyoruz
          wget -O kernel.tar.gz https://github.com/universal7870/android_kernel_samsung_exynos7870/archive/refs/heads/lineage-18.1.tar.gz
          mkdir kernel_src
          tar -xzf kernel.tar.gz -C kernel_src --strip-components=1

      - name: Toolchain İndir
        run: |
          wget -O toolchain.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/pie-release.tar.gz
          mkdir toolchain
          tar -xzf toolchain.tar.gz -C toolchain

      - name: Derleme Başlat
        run: |
          cd kernel_src
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          
          # Binder64 Yaması
          sed -i 's/CONFIG_ANDROID_BINDER_IPC_32BIT=y/# CONFIG_ANDROID_BINDER_IPC_32BIT is not set/' .config || true
          echo "CONFIG_ANDROID_BINDER64_PROTOCOL=y" >> .config
          
          make ARCH=arm64 exynos7870-j7refte_defconfig
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          
