name: SM-G611F Sıfırdan 64-Bit Kernel Derleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Google Drive Onay Duvarını Aşarak Kodu İndir
      run: |
        # 1. Google'ın büyük dosyalar için çıkardığı o uyarı sayfasından gizli onay kodunu (confirm token) çekiyoruz
        CONFIRM=$(curl -s -c cookies.txt "https://docs.google.com/uc?export=download&id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" | grep -o 'confirm=[^&]*' | head -n1)
        
        # 2. Eğer onay kodu bulunduysa onunla, bulunmadıysa direkt indiriyoruz
        if [ ! -z "$CONFIRM" ]; then
          curl -L -b cookies.txt "https://docs.google.com/uc?export=download&${CONFIRM}&id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" -o samsung_kernel.zip
        else
          curl -L -b cookies.txt "https://docs.google.com/uc?export=download&id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" -o samsung_kernel.zip
        fi

        # 3. İndirilen ana zip dosyasını ayıkla
        mkdir -p extracted
        unzip samsung_kernel.zip -d extracted || true
        rm samsung_kernel.zip cookies.txt
        
        # 4. Samsung ana paketinin içindeki gerçek "Kernel" paketini bul ve ana dizine aç
        cd extracted
        INNER_PACK=$(find . -name "*Kernel*" -o -name "*kernel*")
        if [ ! -z "$INNER_PACK" ]; then
          if [[ "$INNER_PACK" == *.zip ]]; then
            unzip "$INNER_PACK" -d $GITHUB_WORKSPACE/
          else
            tar -xf "$INNER_PACK" -C $GITHUB_WORKSPACE/ || tar -xf "$INNER_PACK" --strip-components=1 -C $GITHUB_WORKSPACE/
          fi
        else
          cp -r * $GITHUB_WORKSPACE/
        fi
        cd $GITHUB_WORKSPACE
        rm -rf extracted

    - name: Gerekli Linux Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex git rsync libncurses5-dev tcl crossbuild-essential-arm64

    - name: Google AOSP Clang Derleyicisini Kur (64-Bit İçin)
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353395c.tar.gz
        tar -xf clang-r353395c.tar.gz

    - name: Kodları 64-Bit'e Zorla ve Derlemeyi Başlat
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang

        mkdir -p out
        mkdir -p arch/arm64/configs
        
        # Orijinal konfigürasyonu bul ve arm64 klasörüne kopyala
        if [ -f arch/arm/configs/exynos7870_g611f_defconfig ]; then
          cp arch/arm/configs/exynos7870_g611f_defconfig arch/arm64/configs/exynos7870_defconfig
        elif [ -f arch/arm/configs/exynos7870_defconfig ]; then
          cp arch/arm/configs/exynos7870_defconfig arch/arm64/configs/exynos7870_defconfig
        else
          cp arch/arm/configs/*defconfig arch/arm64/configs/exynos7870_defconfig
        fi
        
        # Defconfig oluştur ve derle
        make O=out exynos7870_defconfig
        make O=out -j$(nproc --all)

    - name: Hata Loglarını Kurtar
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ARM64-Official-Samsung-Results
        path: |
          out/arch/arm64/boot/Image*
          out/.config
          
