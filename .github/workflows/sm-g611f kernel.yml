name: Build ARM64+Treble Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential flex bison bc libelf-dev libssl-dev \
          libncurses-dev gcc-aarch64-linux-gnu unzip device-tree-compiler wget python3-pip
          pip install gdown

      - name: Download Kernel Source
        run: |
          gdown "https://drive.google.com/uc?id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" -O kernel.zip
          unzip kernel.zip -d kernel_source
          cd kernel_source
          tar -xzf Kernel.tar.gz
          ls -la

      - name: Find Kernel Directory
        id: find_kernel
        run: |
          KERNEL_DIR=$(find kernel_source -maxdepth 2 -type d -iname "*kernel*" | head -1)
          if [ -z "$KERNEL_DIR" ]; then
            echo "Kernel klasörü bulunamadı!"
            exit 1
          fi
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          echo "Bulunan klasör: $KERNEL_DIR"

      - name: Configure and Build Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make on7xreflte_01_defconfig
          scripts/config --enable CONFIG_ANDROID_BINDER_IPC
          scripts/config --enable CONFIG_ANDROID_VENDOR_OEM_UNLOCK_SUPPORT
          scripts/config --enable CONFIG_ANDROID_HIDL_IPC
          scripts/config --enable CONFIG_ION
          scripts/config --enable CONFIG_SYNC_FILE
          scripts/config --enable CONFIG_DM_VERITY
          scripts/config --enable CONFIG_DM_VERITY_FEC
          make olddefconfig
          make -j$(nproc) Image
          make -j$(nproc) dtbs

      - name: Package Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          mkdir -p release
          cp arch/arm64/boot/Image release/
          cp arch/arm64/boot/dts/*.dtb release/ 2>/dev/null || true
          cd release
          zip -r ../../SM-G611F_64bit_Treble_Kernel.zip *
          cd ../..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM-G611F_64bit_Treble_Kernel
          path: SM-G611F_64bit_Treble_Kernel.zip
