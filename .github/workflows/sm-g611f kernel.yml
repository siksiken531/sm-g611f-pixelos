name: 🔥 SM-G611F Kernel (Nano Config)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: ⚡ Setup Environment
      run: |
        sudo apt update
        sudo apt install -y git build-essential flex bison bc \
          zip curl python3-pip libssl-dev device-tree-compiler \
          gcc-aarch64-linux-gnu make gcc libncurses5-dev \
          libelf-dev libssl-dev dwarves nano

    - name: 📥 Download Samsung Kernel
      run: |
        mkdir -p kernel-source
        if [ -f "Kernel.tar.gz" ]; then
          tar -xzf Kernel.tar.gz -C kernel-source/
        else
          pip3 install gdown
          gdown "https://drive.google.com/uc?id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg" -O source.zip
          unzip source.zip -d kernel-source/
        fi
        
        cd kernel-source
        
        if [ -f "Kernel.tar.gz" ]; then
          tar -xzf Kernel.tar.gz
        fi
        
        if [ -f "Platform.tar.gz" ]; then
          tar -xzf Platform.tar.gz
        fi
        
        if [ -d "kernel" ]; then
          mv kernel/* .
          rmdir kernel
        fi
        
        echo "✅ Kaynaklar hazır!"

    - name: 🔧 Setup Toolchain
      run: |
        cd kernel-source
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain
        export PATH=$(pwd)/toolchain/bin:$PATH
        echo "PATH=$(pwd)/toolchain/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "ARCH=arm64" >> $GITHUB_ENV

    - name: 📝 Create Config with Nano
      run: |
        cd kernel-source
        
        # Nano ile config oluştur
        echo "📂 Nano ile .config oluşturuluyor..."
        nano .config <<'EOF'
        #
        # Automatically generated config
        #
        CONFIG_ARM64=y
        CONFIG_ARM64_4K_PAGES=y
        CONFIG_ARM64_16K_PAGES=n
        CONFIG_ARM64_64K_PAGES=n
        
        # Samsung Exynos
        CONFIG_ARCH_EXYNOS=y
        CONFIG_ARCH_EXYNOS7=y
        CONFIG_SOC_EXYNOS7870=y
        CONFIG_MACH_EXYNOS7870=y
        CONFIG_MACH_G611F=y
        CONFIG_EXYNOS_DEV_DRV=y
        
        # Treble zorunlu
        CONFIG_ANDROID=y
        CONFIG_ANDROID_BINDER_IPC=y
        CONFIG_ANDROID_BINDERFS=y
        CONFIG_ANDROID_VENDOR=y
        CONFIG_ANDROID_TREBLE=y
        
        # GSI için gerekli
        CONFIG_ION=y
        CONFIG_SYNC_FILE=y
        CONFIG_DM_ANDROID=y
        CONFIG_OVERLAY_FS=y
        
        # Performans
        CONFIG_HZ_300=y
        CONFIG_HZ=300
        CONFIG_PREEMPT=y
        CONFIG_ENERGY_AWARE_SCHEDULING=y
        CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
        
        # Dosya sistemleri
        CONFIG_EXT4_FS=y
        CONFIG_EXT4_FS_POSIX_ACL=y
        CONFIG_EXT4_FS_SECURITY=y
        CONFIG_F2FS_FS=y
        CONFIG_F2FS_FS_SECURITY=y
        CONFIG_NTFS_FS=y
        
        # Donanım desteği
        CONFIG_MMC=y
        CONFIG_MMC_SDHCI=y
        CONFIG_MMC_SDHCI_S3C=y
        CONFIG_USB=y
        CONFIG_USB_XHCI_HCD=y
        CONFIG_USB_EHCI_HCD=y
        CONFIG_USB_OHCI_HCD=y
        CONFIG_USB_STORAGE=y
        
        # Ağ
        CONFIG_NET=y
        CONFIG_INET=y
        CONFIG_IPV6=y
        CONFIG_WIRELESS=y
        CONFIG_WLAN=y
        
        # Ses
        CONFIG_SOUND=y
        CONFIG_SND=y
        CONFIG_SND_SOC=y
        CONFIG_SND_SOC_SAMSUNG=y
        
        # Kamera
        CONFIG_MEDIA_SUPPORT=y
        CONFIG_VIDEO_DEV=y
        CONFIG_V4L_PLATFORM_DRIVERS=y
        
        # Bluetooth
        CONFIG_BT=y
        CONFIG_BT_HCIUART=y
        CONFIG_BT_HCIUART_H4=y
        
        # GPU
        CONFIG_DRM=y
        CONFIG_DRM_PANEL=y
        CONFIG_DRM_EXYNOS=y
        
        # Güç yönetimi
        CONFIG_PM=y
        CONFIG_PM_DEBUG=y
        CONFIG_PM_SLEEP=y
        CONFIG_PM_SLEEP_DEBUG=y
        EOF
        
        # Ctrl+O, Enter, Ctrl+X işlemini otomatik yap
        # (Nano zaten dosyayı kaydedip çıkıyor)
        
        echo "✅ Config oluşturuldu!"
        wc -l .config
        
        # Config'i kontrol et
        echo "📂 Config içeriği (ilk 30 satır):"
        head -30 .config

    - name: 🏗️ Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        
        # Config'i düzenle
        echo "📂 Config düzenleniyor..."
        make oldconfig 2>/dev/null || true
        
        # Derle
        echo "📂 Derleme başlıyor..."
        make -j$(nproc) 2>&1 | tee build.log
        
        # Kernel görüntüsünü bul
        echo "🔍 Kernel görüntüsü aranıyor..."
        if [ -f "arch/arm64/boot/Image.gz" ]; then
          echo "✅ Image.gz bulundu!"
          ls -lh arch/arm64/boot/Image.gz
        elif [ -f "arch/arm64/boot/Image" ]; then
          echo "✅ Image bulundu! Sıkıştırılıyor..."
          gzip -9 arch/arm64/boot/Image
          ls -lh arch/arm64/boot/Image.gz
        elif [ -f "arch/arm64/boot/zImage" ]; then
          echo "✅ zImage bulundu! Sıkıştırılıyor..."
          gzip -9 arch/arm64/boot/zImage
          mv arch/arm64/boot/zImage.gz arch/arm64/boot/Image.gz
          ls -lh arch/arm64/boot/Image.gz
        elif [ -f "vmlinux" ]; then
          echo "✅ vmlinux bulundu!"
          ls -lh vmlinux
        else
          echo "❌ Kernel görüntüsü bulunamadı!"
          echo "📂 Mevcut dosyalar:"
          find . -name "*Image*" -o -name "*zImage*" -o -name "vmlinux" | head -20
          exit 1
        fi

    - name: 📦 Create Boot.img
      run: |
        mkdir -p boot-package
        
        # Kernel'i bul
        if [ -f "kernel-source/arch/arm64/boot/Image.gz" ]; then
          KERNEL_IMG="kernel-source/arch/arm64/boot/Image.gz"
        elif [ -f "kernel-source/arch/arm64/boot/Image" ]; then
          gzip -9 kernel-source/arch/arm64/boot/Image
          KERNEL_IMG="kernel-source/arch/arm64/boot/Image.gz"
        elif [ -f "kernel-source/arch/arm64/boot/zImage" ]; then
          gzip -9 kernel-source/arch/arm64/boot/zImage
          mv kernel-source/arch/arm64/boot/zImage.gz kernel-source/arch/arm64/boot/Image.gz
          KERNEL_IMG="kernel-source/arch/arm64/boot/Image.gz"
        else
          echo "❌ Kernel görüntüsü yok!"
          exit 1
        fi
        
        echo "✅ Kernel: $KERNEL_IMG"
        
        dd if=/dev/zero of=boot-package/boot.img bs=1M count=32
        dd if=$KERNEL_IMG of=boot-package/boot.img bs=4096 seek=2048 conv=notrunc
        
        if [ -d "kernel-source/arch/arm64/boot/dts" ]; then
          for dtb in kernel-source/arch/arm64/boot/dts/*/*.dtb 2>/dev/null; do
            [ -f "$dtb" ] && dd if=$dtb of=boot-package/boot.img bs=4096 seek=4096 conv=notrunc
          done
        fi
        
        echo "✅ boot.img oluşturuldu!"

    - name: 🦊 Create OrangeFox Package
      run: |
        mkdir -p ofox-package/META-INF/com/google/android
        mkdir -p ofox-package/devices/g611f
        
        cat > ofox-package/META-INF/com/google/android/updater-script <<'EOF'
        ui_print(" ");
        ui_print("🦊 OrangeFox Recovery");
        ui_print("📱 SM-G611F Kernel");
        ui_print("=======================================");
        ui_print(" ");
        ui_print("🔹 Tüm PixelOS GSI'lar ile uyumlu");
        ui_print("🔹 Treble + ARM64");
        ui_print(" ");
        
        if [ -e "/dev/block/by-name/boot" ]; then
          BOOT_PART="/dev/block/by-name/boot"
        else
          ui_print "❌ Boot partition not found!"
          exit 1
        fi
        
        ui_print "📌 Flashing kernel...";
        dd if=/dev/zero of=$BOOT_PART bs=4096 count=8192
        package_extract_file("boot.img", $BOOT_PART);
        
        ui_print " ";
        ui_print "✅ Kernel flashed!";
        ui_print(" ");
        ui_print("🔄 Rebooting...");
        sleep 3
        reboot
        EOF
        
        cp boot-package/boot.img ofox-package/
        
        cat > ofox-package/devices/g611f/device.prop <<EOF
        ro.product.model=SM-G611F
        ro.product.brand=samsung
        ro.product.device=g611f
        ro.arch=arm64
        ro.treble.enabled=true
        ro.vndk.version=34
        EOF
        
        cd ofox-package
        zip -r9 ../SM-G611F_Kernel_$(date +%Y%m%d_%H%M).zip *
        cd ..

    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SM-G611F-Kernel
        path: |
          SM-G611F_Kernel_*.zip
          boot-package/boot.img
        retention-days: 7
