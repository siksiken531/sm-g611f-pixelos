name: SM-G611F Sıfırdan 64-Bit Kernel Derleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: GoFile Üzerindeki Resmi Samsung Kodunu Doğrudan İndir
      run: |
        # GoFile indirme sayfasından gerçek indirme tokenını ve sunucu linkini dinamik olarak çekiyoruz
        # Sayfa linki: https://gofile.io/d/c49ad81a-d258-47fc-8676-dcfad8969d81
        
        # GoFile API'sinden dosyanın doğrudan indirme linkini alan komut:
        DIRECT_URL=$(curl -s "https://api.gofile.io/getContents?contentId=c49ad81a-d258-47fc-8676-dcfad8969d81" | grep -o '"link":"[^"]*' | cut -d'"' -f4)
        
        # Eğer API linki doğrudan vermezse alternatif indirme rotasını kullanıyoruz
        if [ ! -z "$DIRECT_URL" ]; then
          curl -L "$DIRECT_URL" -o samsung_kernel.zip
        else
          # Alternatif doğrudan sunucu rotası
          curl -L "https://store1.gofile.io/download/web/c49ad81a-d258-47fc-8676-dcfad8969d81/SM-G611F_MEA_PP_Opensource.zip" -o samsung_kernel.zip
        fi

        # Klasör oluştur ve ana zip'i ayıkla
        mkdir -p samsung_extracted
        unzip samsung_kernel.zip -d samsung_extracted || true
        rm samsung_kernel.zip

        # Samsung ana paketinin içindeki gerçek Kernel paketini bulup ana dizine çıkarıyoruz
        cd samsung_extracted
        KERNEL_PACK=$(find . -name "*Kernel*" -o -name "*kernel*")
        if [ ! -z "$KERNEL_PACK" ]; then
          if [[ "$KERNEL_PACK" == *.zip ]]; then
            unzip "$KERNEL_PACK" -d $GITHUB_WORKSPACE/
          else
            tar -xf "$KERNEL_PACK" -C $GITHUB_WORKSPACE/ || tar -xf "$KERNEL_PACK" --strip-components=1 -C $GITHUB_WORKSPACE/
          fi
        else
          cp -r * $GITHUB_WORKSPACE/
        fi
        cd $GITHUB_WORKSPACE
        rm -rf samsung_extracted

    - name: Gerekli Linux Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex git rsync libncurses5-dev tcl crossbuild-essential-arm64

    - name: Google AOSP Clang Derleyicisini Kur (64-Bit İçin)
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353395c.tar.gz
        tar -xf clang-r353395c.tar.gz

    - name: Kodları 64-Bit'e Zorla ve Derlemeyi Başlat
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang

        mkdir -p out
        mkdir -p arch/arm64/configs
        
        # Orijinal konfigürasyonu arm64 klasörüne taşıyoruz
        if [ -f arch/arm/configs/exynos7870_g611f_defconfig ]; then
          cp arch/arm/configs/exynos7870_g611f_defconfig arch/arm64/configs/exynos7870_defconfig
        elif [ -f arch/arm/configs/exynos7870_defconfig ]; then
          cp arch/arm/configs/exynos7870_defconfig arch/arm64/configs/exynos7870_defconfig
        else
          cp arch/arm/configs/*defconfig arch/arm64/configs/exynos7870_defconfig
        fi
        
        # 64-bit tabanlı konfigürasyonu oluşturmayı dene
        make O=out exynos7870_defconfig

        # Motoru (Kernel'ı) derlemeye başla
        make O=out -j$(nproc --all)

    - name: Hata Loglarını ve Çıktıları Kurtar
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ARM64-Official-Samsung-Results
        path: |
          out/arch/arm64/boot/Image*
          out/.config
          
