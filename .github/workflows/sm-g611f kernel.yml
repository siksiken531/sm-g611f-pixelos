name: SM-G611F Sıfırdan 64-Bit Kernel Derleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Samsung Resmi Açık Kaynak Sitesinden Kaynak Kodunu İndir
      run: |
        # SM-G611F için Samsung'un resmi kaynak kod paketini sunucuya indiriyoruz
        # Not: Samsung'un indirme linkleri bazen doğrudan curl izni vermezse alternatif açık kaynak yansısını kullanıyoruz
        curl -L "https://github.com/exynos7870/android_kernel_samsung_exynos7870/archive/refs/heads/pie.tar.gz" -o kernel.tar.gz
        
        # Zip/Tar paketini klasöre açıyoruz
        tar -xf kernel.tar.gz --strip-components=1
        rm kernel.tar.gz

    - name: Gerekli Linux Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex git rsync libncurses5-dev tcl crossbuild-essential-arm64

    - name: Google AOSP Clang Derleyicisini Kur (64-Bit İçin)
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353395c.tar.gz
        tar -xf clang-r353395c.tar.gz

    - name: Kodları 64-Bit'e Zorla ve Derlemeyi Başlat
      run: |
        # Yapıyı tamamen ARM64 mimarisine geçiriyoruz
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Derleme araçlarının yolları
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang

        mkdir -p out
        
        # Burası kritik: 32-bit klasöründeki resmi konfigürasyonu arm64 klasörüne taşıyoruz
        mkdir -p arch/arm64/configs
        if [ -f arch/arm/configs/exynos7870_defconfig ]; then
          cp arch/arm/configs/exynos7870_defconfig arch/arm64/configs/exynos7870_defconfig
        elif [ -f arch/arm/configs/j7poplte_defconfig ]; then
          cp arch/arm/configs/j7poplte_defconfig arch/arm64/configs/exynos7870_defconfig
        fi
        
        # 64-bit tabanlı ilk konfigürasyonu oluşturmayı dene
        make O=out exynos7870_defconfig

        # Motoru (Kernel'ı) derlemeye başla
        make O=out -j$(nproc --all)

    - name: Hata Loglarını ve Çıktıları Kurtar
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ARM64-Official-Samsung-Results
        path: |
          out/arch/arm64/boot/Image*
          out/.config
          
