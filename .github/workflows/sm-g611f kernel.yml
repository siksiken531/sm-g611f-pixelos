name: Samsung Kernel Build

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerekli paketleri kur
        run: sudo apt-get install -y bc bison build-essential flex libssl-dev libncurses-dev
      - name: Samsung Kaynağını ve Toolchain'i çek
        run: |
          git clone --depth=1 https://github.com/ianmacd/j7refte.git kernel
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain
      - name: Binder64 Ayarlarını Uygula
        run: |
          cd kernel
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          make ARCH=arm64 exynos7870-j7refte_defconfig
          # 32-bit Binder'ı kapat, 64-bit'i aç
          sed -i 's/CONFIG_ANDROID_BINDER_IPC_32BIT=y/# CONFIG_ANDROID_BINDER_IPC_32BIT is not set/' .config
          echo "CONFIG_ANDROID_BINDER64_PROTOCOL=y" >> .config
      - name: Derlemeyi Başlat
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          make -j$(nproc)
      - name: Çıktıyı al
        run: |
          mkdir output
          cp kernel/arch/arm64/boot/Image.gz-dtb output/
          # Şimdi bunu Release olarak paylaşacağız...
          
