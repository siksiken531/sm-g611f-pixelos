name: J7 Prime 2 Full Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerekli Paketler
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential flex libssl-dev libncurses-dev
      
      - name: Kaynak Kodları Klonla
        run: |
          # 1. Kernel (Motor)
          git clone --depth=1 https://github.com/universal7870/android_kernel_samsung_exynos7870.git kernel
          # 2. Device Tree (Bağlantılar) - Senin bulduğun depo
          git clone --depth=1 https://github.com/AndroidBlobs/device_samsung_on7xreflte.git device_tree
          # 3. Toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain
      
      - name: Derleme Başlat
        run: |
          cd kernel
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          # Binder64 Yaması
          sed -i 's/CONFIG_ANDROID_BINDER_IPC_32BIT=y/# CONFIG_ANDROID_BINDER_IPC_32BIT is not set/' .config
          echo "CONFIG_ANDROID_BINDER64_PROTOCOL=y" >> .config
          
          make ARCH=arm64 exynos7870-j7refte_defconfig
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          
