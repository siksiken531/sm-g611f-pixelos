name: SM-G611F Sıfırdan 64-Bit Kernel Derleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Kullanıcının Doğrudan Google Drive Linkinden Resmi Kodu İndir
      run: |
        # Onay duvarını aşan doğrudan indirme linkini kullanarak zip dosyasını çekiyoruz
        curl -L "https://drive.usercontent.google.com/download?id=1yqmb6s4wf4ebR-JC2DCDMhCg_3SP7VFg&export=download" -o main_samsung.zip
        
        # Zip dosyasını açıyoruz
        mkdir -p samsung_extracted
        unzip main_samsung.zip -d samsung_extracted || true
        rm main_samsung.zip

        # Samsung ana paketinin içindeki gerçek Kernel paketini bulup buraya çıkarıyoruz
        cd samsung_extracted
        KERNEL_PACK=$(find . -name "*Kernel*" -o -name "*kernel*")
        if [ ! -z "$KERNEL_PACK" ]; then
          if [[ "$KERNEL_PACK" == *.zip ]]; then
            unzip "$KERNEL_PACK" -d $GITHUB_WORKSPACE/
          else
            tar -xf "$KERNEL_PACK" -C $GITHUB_WORKSPACE/ || tar -xf "$KERNEL_PACK" --strip-components=1 -C $GITHUB_WORKSPACE/
          fi
        else
          # Eğer alt paket yoksa her şeyi doğrudan ana dizine taşı
          cp -r * $GITHUB_WORKSPACE/
        fi
        cd $GITHUB_WORKSPACE
        rm -rf samsung_extracted

    - name: Gerekli Linux Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex git rsync libncurses5-dev tcl crossbuild-essential-arm64

    - name: Google AOSP Clang Derleyicisini Kur (64-Bit İçin)
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353395c.tar.gz
        tar -xf clang-r353395c.tar.gz

    - name: Kodları 64-Bit'e Zorla ve Derlemeyi Başlat
      run: |
        # Yapıyı tamamen ARM64 mimarisine geçiriyoruz
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Derleme araçlarının yolları
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang

        mkdir -p out
        mkdir -p arch/arm64/configs
        
        # Klasördeki ilk bulduğu defconfig'i arm64'e kopyala
        if [ -f arch/arm/configs/exynos7870_g611f_defconfig ]; then
          cp arch/arm/configs/exynos7870_g611f_defconfig arch/arm64/configs/exynos7870_defconfig
        elif [ -f arch/arm/configs/exynos7870_defconfig ]; then
          cp arch/arm/configs/exynos7870_defconfig arch/arm64/configs/exynos7870_defconfig
        else
          cp arch/arm/configs/*defconfig arch/arm64/configs/exynos7870_defconfig
        fi
        
        # 64-bit tabanlı konfigürasyonu oluştur
        make O=out exynos7870_defconfig

        # Derlemeyi başlat
        make O=out -j$(nproc --all)

    - name: Hata Loglarını ve Çıktıları Kurtar
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ARM64-Official-Samsung-Results
        path: |
          out/arch/arm64/boot/Image*
          out/.config
          
