name: J7 Prime 2 Kernel Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git ayarlarını sıfırla
        run: |
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      - name: Klonlama (Stabil)
        run: |
          # 404 hatası almamak için HTTPS yerine doğrudan depoyu hedefliyoruz
          git clone --depth=1 https://github.com/universal7870/android_kernel_samsung_exynos7870.git kernel
          git clone --depth=1 https://github.com/AndroidBlobs/device_samsung_on7xreflte.git device
      - name: Derleme
        run: |
          cd kernel
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          # Binder64 yapılandırması
          sed -i 's/CONFIG_ANDROID_BINDER_IPC_32BIT=y/# CONFIG_ANDROID_BINDER_IPC_32BIT is not set/' .config
          echo "CONFIG_ANDROID_BINDER64_PROTOCOL=y" >> .config
          make ARCH=arm64 exynos7870-j7refte_defconfig
          make -j$(nproc)
          
