name: ngrok ile Dogrudan SSH Baglantisi

on:
  workflow_dispatch:

jobs:
  live_debug:
    runs-on: ubuntu-22.04

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Paketleri Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev glibc-source ccache automake libgmp-dev libmpfr-dev libmpc-dev lzop lzma crossbuild-essential-armhf crossbuild-essential-arm64 file unzip python3-pip curl wget
        pip3 install gdown

    - name: ngrok Kur ve SSH Tüneli Başlat
      run: |
        # 1. ngrok resmi deposunu ve paketini hatasız kuruyoruz
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo shadowconfig on > /dev/null 2>&1 || true
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo apt-key add -
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install -y ngrok

        # 2. ngrok Token Tanımlama
        ngrok config add-authtoken 3FxIXCVsZ1FFDCf68xsHVhcSMjm_82wYpz9zYcUhRfTeDumB9

        # 3. GitHub kullanıcısının (runner) şifresini belirliyoruz (Bağlanırken lazım olacak)
        echo "runner:1234" | sudo chpasswd

        echo "=== SSH BAĞLANTI ADRESİNİZ HAZIRLANIYOR ==="
        
        # 4. Doğrudan SSH (22. portu) internete açıyoruz
        ngrok tcp 22 --log=stdout
        
