name: Setup Ubuntu XFCE with TigerVNC (32-bit color)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Ubuntu XFCE with TigerVNC and noVNC
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server websockify net-tools git curl
          
          mkdir -p ~/.vnc
          echo "password" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          echo "#!/bin/sh" > ~/.vnc/xstartup
          echo "[ -r \$HOME/.Xresources ] && xrdb \$HOME/.Xresources" >> ~/.vnc/xstartup
          echo "unset SESSION_MANAGER" >> ~/.vnc/xstartup
          echo "unset DBUS_SESSION_BUS_ADDRESS" >> ~/.vnc/xstartup
          echo "startxfce4" >> ~/.vnc/xstartup
          chmod +x ~/.vnc/xstartup
          
          vncserver :1 -geometry 1280x720 -depth 32
          
          git clone https://github.com/novnc/noVNC.git /tmp/novnc
          /tmp/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6080 &
          
          echo "noVNC Tüneli oluşturuluyor..."
          ssh -o StrictHostKeyChecking=no -T -R 80:localhost:6080 nokey@localhost.run &
          
          sleep 43200
          
