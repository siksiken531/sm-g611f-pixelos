name: Build and Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl wget unzip build-essential openssh-client

    - name: Add SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys

    - name: Start tmate session
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false

    - name: Show SSH address
      run: |
        echo "Use this command to connect via OpenSSH:"
        echo "ssh $(whoami)@$(hostname)"
