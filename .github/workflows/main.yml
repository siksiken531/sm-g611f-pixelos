 name: Root SSH Debug

on:
  workflow_dispatch: # Bu satır, "Actions" sekmesinden "Run workflow" butonuna basarak manuel başlatmanı sağlar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true # Sadece senin GitHub hesabının bağlanmasına izin verir

      - name: Keep session alive
        run: |
          echo "SSH bağlantısı kuruldu. İşlemlerini yapabilirsin."
          echo "Root olmak için terminale: sudo -i yazabilirsin."
          sleep 1800 # 30 dakika boyunca oturumu açık tutar
          
