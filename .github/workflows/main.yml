name: Remote Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    # ubuntu-latest kullanmak daha hızlı başlatılmasını sağlar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Uzak Terminali Başlat (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          # SSH bağlantısı için manuel müdahale gerekip gerekmediğini ayarlar
          limit-access-to-actor: true
          # Süre dolmadan önce terminale bağlanmazsanız otomatik kapatır
          timeout-minutes: 360
          
