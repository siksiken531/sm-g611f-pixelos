name: Tmate SSH Session

on:
  workflow_dispatch: # GitHub üzerinden manuel başlatmak için

jobs:
  tmate:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Checkout Et
        uses: actions/checkout@v4

      - name: Tmate SSH Oturumunu Başlat
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false # Bağlantıyı herkese/size açık tutar
          
