name: ngrok Canli Web Terminali

on:
  workflow_dispatch:

jobs:
  live_debug:
    runs-on: ubuntu-22.04

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Paketleri Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev glibc-source ccache automake libgmp-dev libmpfr-dev libmpc-dev lzop lzma crossbuild-essential-armhf crossbuild-essential-arm64 file unzip python3-pip curl wget
        pip3 install gdown

    - name: GoTTY ve ngrok Kurulumu
      run: |
        # GoTTY Kuruluyor
        wget https://github.com/yudai/gotty/releases/download/v1.0.1/gotty_linux_amd64.tar.gz
        tar -xf gotty_linux_amd64.tar.gz
        sudo mv gotty /usr/local/bin/
        rm -f gotty_linux_amd64.tar.gz

        # ngrok Kuruluyor
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.dev/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok

        # ngrok Token Tanımlama
        ngrok config add-authtoken 3FxIXCVsZ1FFDCf68xsHVhcSMjm_82wYpz9zYcUhRfTeDumB9

        # GoTTY arka planda başlatılıyor (Dışarıya port veriyoruz)
        gotty -w --port 8080 bash > gotty.log 2>&1 &
        sleep 2

        # ngrok tüneli açılıyor ve bağlantı linki loglara basılıyor
        ngrok http 8080 --log=stdout
        
