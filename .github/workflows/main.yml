name: Interactive SSH Session

on:
  workflow_dispatch:

jobs:
  ssh-session:
    runs-on: ubuntu-22.04

    steps:
      - name: Repositoriyi Kopyala
        uses: actions/checkout@v4

      - name: SSH ile Bağlantı Başlat (Tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          authorized-keys: ${{ secrets.SSH_PUBLIC_KEY }}
          
