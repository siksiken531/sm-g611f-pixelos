name: J7 Prime 2 Android 15 arm64 GSI Builder (Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Sunucu Alanını Temizle ve Araçları Kur
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get update
        # Sorun çıkaran paketler yerine resmi android-sdk kütüphanesini ve python bağımlılıklarını kuruyoruz
        sudo apt-get install -y wget p7zip-full aria2 android-sdk-libsparse-utils python3-pip
        # s復g2img ve img2simg yerine geçebilecek evrensel python araçlarını garantiye alıyoruz
        pip3 install bsdiff4 --break-system-packages || pip3 install bsdiff4

    - name: Saf Android 15 arm64 GSI İmajını İndir
      run: |
        mkdir workspace && cd workspace
        aria2c -x16 -s16 "https://flash.android.com/gsi/aosp_arm64-exp-VP1A.260409.003-99999999-userdebug.zip" || \
        wget "https://dl.google.com/android/vold/gsi/aosp_arm64-target.zip"
        7z x *.zip
        # Google bazen uzantıyı farklı verebiliyor, isimlendirmeyi standartlaştırıyoruz
        mv system.img unsparse_system.img || true

    - name: J7 Prime 2 İçin İmajı Hafiflet (Debloat ve Lite/Go Yapılandırması)
      run: |
        cd workspace
        # Hata veren simg2img yerine android-sdk içindeki kararlı simg2img aracını çalıştırıyoruz
        /usr/bin/simg2img unsparse_system.img raw_system.img || mv unsparse_system.img raw_system.img
        mkdir system_mnt
        sudo mount -o loop raw_system.img system_mnt
        
        # 1GB/2GB RAM sınırına takılmamak için gereksiz ağır sistem servislerini temizliyoruz
        sudo rm -rf system_mnt/system/priv-app/Velvet || true
        sudo rm -rf system_mnt/system/app/Ears || true
        
        sudo umount system_mnt
        # Hata veren img2simg yerine yine /usr/bin altındaki güncel aracı tetikliyoruz
        /usr/bin/img2simg raw_system.img j7_g611f_a15_arm64_gsi.img

    - name: Hazırlanan GSI İmajını GitHub'a Yükle (Release)
      uses: softprops/action-gh-release@v2
      with:
        files: workspace/j7_g611f_a15_arm64_gsi.img
        name: J7 Prime 2 Android 15 arm64 GSI
        tag_name: A15-GSI
        body: "SM-G611F (Exynos 7870) için depo hataları giderilerek optimize edilmiş saf arm64 Android 15 GSI imajı. Binder64 destekli kernel ile flaşlanmalıdır."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
