name: Build AOSP 15 GSI + Vendor for SM-G611F
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'vanilla'
        type: choice
        options:
          - vanilla
          - gapps

jobs:
  build-aosp-gsi:
    name: Build AOSP 15 GSI
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 6 saat max
    
    steps:
      # 1. Temel bağımlılıkları yükle
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            python3 python3-pip python3-venv
      
      # 2. Repo aracını kur
      - name: Setup Repo Tool
        run: |
          mkdir -p ~/.local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      # 3. AOSP kaynak kodunu indir (Android 15)
      - name: Init AOSP Source
        run: |
          mkdir -p aosp
          cd aosp
          repo init -u https://android.googlesource.com/platform/manifest -b android-15.0.0_r1 --depth=1
      
      - name: Sync AOSP Source
        run: |
          cd aosp
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags
        timeout-minutes: 120
      
      # 4. Treble yapılandırmasını ekle
      - name: Configure Treble Build
        run: |
          cd aosp
          # Treble yapılandırması için gerekli patch'ler
          # Burada ponces/treble_aosp patch'lerini uygula
          git clone https://github.com/ponces/treble_aosp.git device/phh/treble
          . build/envsetup.sh
          lunch treble_arm64_bv-userdebug
      
      # 5. GSI'yı derle
      - name: Build GSI
        run: |
          cd aosp
          export WITH_DEXPREOPT=false
          make -j$(nproc) systemimage
        timeout-minutes: 180
      
      # 6. Derlenen GSI'yi paketle
      - name: Package GSI
        run: |
          cd aosp
          mkdir -p output
          cp out/target/product/treble_arm64/system.img output/
          xz -9v output/system.img
      
      # 7. Project Spaget X Vendor'ı derle
      - name: Build Spaget X Vendor
        run: |
          git clone https://github.com/ananjaser1211/Helios_7870.git vendor_source
          cd vendor_source
          # Vendor derleme komutları
          make -j$(nproc)
        timeout-minutes: 60
      
      # 8. Vendor'u paketle
      - name: Package Vendor
        run: |
          cd vendor_source
          zip -r ../Exynos7870_Spaget_X.zip META-INF vendor tools
          cd ..
          zip -r Exynos7870_CreateVendor.zip createvendor.sh
      
      # 9. Artifact olarak kaydet
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SM-G611F-AOSP15-GSI-with-Vendor
          path: |
            aosp/output/system.img.xz
            Exynos7870_Spaget_X.zip
            Exynos7870_CreateVendor.zip
          retention-days: 7
