name: PixelOS Android 15 (Pure ARM64 Conversion) for SM-G611F

on:
  workflow_dispatch: # Manuel olarak çalıştırmak için buton tetikleyicisi

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Depoyu Al (Checkout)
      uses: actions/checkout@v4

    # GitHub'ın kısıtlı disk alanını (~100GB+ üzerine çıkarmak için) temizliyoruz
    - name: Disk Alanını Maksimuma Çıkar
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: 64-Bit ve 32-Bit Geliştirici Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 crossbuild-essential-arm64 crossbuild-essential-armhf

    - name: Repo Aracını Kur
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Git Kimlik Bilgilerini Ayarla
      run: |
        git config --global user.name "Geliştirici"
        git config --global user.email "developer@example.com"

    - name: PixelOS Android 15 Kaynak Kodunu İndir
      run: |
        mkdir android && cd android
        # PixelOS Android 15 (fifteen) tabanı
        repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fifteen --git-lfs
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Cihaz Ağaçlarını Çek
      run: |
        cd android
        # Buradaki repoları kendi kullandığın ağaçlarla değiştirmelisin
        git clone https://github.com/Kendi-Depon/android_device_samsung_g611f.git -b android-15 device/samsung/g611f
        git clone https://github.com/Kendi-Depon/android_vendor_samsung_g611f.git -b android-15 vendor/samsung/g611f
        git clone https://github.com/Kendi-Depon/android_kernel_samsung_exynos7870.git -b android-15 kernel/samsung/exynos7870

    # YAML İÇİNDE 64-BIT DÖNÜŞÜMÜ (OTOMASYON)
    # Bu adım, çekilen 32-bitlik cihaz ağacını dinamik olarak 64-bit (ARM64) mimariye çevirir.
    - name: Cihaz Ağacını 64-Bit Mimariye Zorla (ARM64 Conversion)
      run: |
        cd android/device/samsung/g611f
        
        # BoardConfig.mk içindeki eski TARGET_ARCH yapılandırmalarını temizle
        sed -i '/TARGET_ARCH/d' BoardConfig.mk
        sed -i '/TARGET_CPU/d' BoardConfig.mk
        
        # BoardConfig.mk dosyasına saf 64-bit ve Binder64 komutlarını enjekte et
        cat <<EOF >> BoardConfig.mk

        # --- YAML Tarafından Otomatik Eklenen 64-Bit Yapılandırması ---
        TARGET_ARCH := arm64
        TARGET_ARCH_VARIANT := armv8-a
        TARGET_CPU_ABI := arm64-v8a
        TARGET_CPU_VARIANT := generic

        TARGET_2ND_ARCH := arm
        TARGET_2ND_ARCH_VARIANT := armv7-a-neon
        TARGET_2ND_CPU_ABI := armeabi-v7a
        TARGET_2ND_CPU_ABI2 := armeabi
        TARGET_2ND_CPU_VARIANT := generic

        TARGET_USES_64_BIT_BINDER := true
        # -------------------------------------------------------------
        EOF
        
        echo "BoardConfig.mk başarıyla 64-bit moduna güncellendi."

    # Kernel'ın 32-bit (arch/arm) yerine 64-bit (arch/arm64) derlenmesi için Makefile optimizasyonu
    - name: Kernel Derleyicisini ARM64 Olarak Ayarla
      run: |
        cd android
        # Android derleme sistemine kernel mimarisinin arm64 olduğunu bildiriyoruz
        export TARGET_KERNEL_ARCH=arm64
        export ARCH=arm64

    - name: CCACHE Önbelleğini Yapılandır
      run: |
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 50G

    - name: ARM64 Derlemeyi Başlat
      run: |
        cd android
        source build/envsetup.sh
        
        # Cihaz ağacındaki isimlendirmeye göre lunch hedefi (Değiştirebilirsin)
        lunch pixelos_g611f-userdebug
        
        # Derleme komutu (bacon = flash edilebilir zip çıktısı üretir)
        mka bacon -j$(nproc --all)

    - name: Üretilen ARM64 ROM Zip Dosyasını GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: PixelOS-Android15-64Bit-SM-G611F
        path: android/out/target/product/g611f/*.zip
        
