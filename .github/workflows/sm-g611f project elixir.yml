name: J7 Prime 2 (64-bit) Project Elixir Otomatik ROM Derleyici

on:
  workflow_dispatch:

jobs:
  build_rom:
    runs-on: ubuntu-22.04
    steps:
    - name: Depoyu Kontrol Et
      uses: actions/checkout@v4

    - name: Sunucu Disk Alanını Maksimum Seviyede Boşalt (En Güçlü Temizlik)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Derleme İçin Gerekli Sistem Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Google Repo Aracını Kur ve Yapılandır
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        git config --global user.name "ElixirBuilder"
        git config --global user.email "elixir@build.local"

    - name: Project Elixir Kaynak Kodlarını ve Ağaçları İndir
      run: |
        mkdir elixir
        cd elixir
        
        # Ana sistemi Project Elixir Fourteen (Android 14) olarak başlatıyoruz
        repo init -u https://github.com/Project-Elixir/manifest.git -b fourteen --git-lfs --depth=1
        
        # Yerel manifest oluşturma - Tag çakışmalarını engellemek için doğrudan fourteen ana dalına eşitliyoruz
        mkdir -p .repo/local_manifests
        cat <<EOF > .repo/local_manifests/g611f.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remote name="github-j7" fetch="https://github.com/" />
          
          <remove-project name="platform/prebuilts/rust" />
          <remove-project name="platform/prebuilts/clang/host/linux-x86" />
          
          <project path="device/samsung/universal7870-common" name="Exynos7870/android_device_samsung_universal7870-common" remote="github-j7" revision="fourteen" upstream="refs/heads/fourteen" />
          <project path="device/samsung/g611f" name="Exynos7870/android_device_samsung_g611f" remote="github-j7" revision="fourteen" upstream="refs/heads/fourteen" />
          <project path="kernel/samsung/universal7870" name="Exynos7870/android_kernel_samsung_universal7870" remote="github-j7" revision="fourteen" upstream="refs/heads/fourteen" />
          <project path="vendor/samsung" name="Exynos7870/android_vendor_samsung" remote="github-j7" revision="fourteen" upstream="refs/heads/fourteen" />
        </manifest>
        EOF

        # 15 dakikalık zaman sınırlı, takılmayı engelleyen akıllı indirme döngüsü
        for i in {1..5}; do
          echo "İndirme denemesi #$i başlatılıyor..."
          timeout 15m repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --current-branch --prune && break || echo "Bağlantı koptu veya zaman aşımına uğradı, tekrar deneniyor..."
          sleep 10
        done

    - name: Project Elixir Kurulumunu Başlat ve Flaşlanabilir Zip Üret
      run: |
        cd elixir
        source build/envsetup.sh
        # Elixir'in Android 14 (ap2a) sürümü için lunch kombinasyonunu tetikliyoruz
        lunch elixir_g611f-ap2a-userdebug
        make elixir -j$(nproc --all)

    - name: Oluşan Hazır ZIP Dosyasını İndirme Linki Yap
      uses: actions/upload-artifact@v4
      with:
        name: Project-Elixir-G611F-Flashable-ROM
        path: elixir/out/target/product/g611f/ProjectElixir_*.zip
        
